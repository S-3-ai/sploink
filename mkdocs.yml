site_name: sploink
site_description: Heterogeneous compute routing for AI agent workflows
site_url: https://s-3-ai.github.io/sploink
repo_url: https://github.com/S-3-ai/sploink
repo_name: S-3-ai/sploink
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - toc.integrate         # merge page TOC into LEFT sidebar (right sidebar disappears)
    - toc.follow            # auto-highlight the current section as user scrolls
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts: concepts.md
  - Architecture: architecture.md
  - Tools: tools.md
  - Examples: examples.md
  - Bench: bench.md
  - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      toc_depth: 3            # include H2 + H3 in the right-side TOC (default: 6, but Material truncates display)

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/S-3-ai/sploink

extra_css:
  - stylesheets/extra.css
